runConfig:
  minInstances: 0
  maxInstances: 4
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  # Public Firebase web config — safe to expose; BUILD availability = inlined into client bundle.
  # Replace the demo values with your real Web App config (Firebase console > Project settings).
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyD47GsyffCTWd9MkM8SYzLBMo5aOuD47vw
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: shulsearch-app.firebaseapp.com
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: shulsearch-app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: shulsearch-app.firebasestorage.app
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "943172835834"
    availability: [BUILD, RUNTIME]
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: 1:943172835834:web:46aac3ae448cc2852fec43
    availability: [BUILD, RUNTIME]
  # Public, HTTP-referrer-restricted Maps JS key (safe to expose).
  - variable: NEXT_PUBLIC_GOOGLE_MAPS_BROWSER_KEY
    value: AIzaSyBngDCyGb5VceAvdSFXoQrWa1H9piPiYQ0
    availability: [BUILD, RUNTIME]
  # Admin allowlist (comma-separated Google account emails). Not secret.
  - variable: ADMIN_EMAILS
    value: elijahmsilverman@gmail.com
    availability: [RUNTIME]
  - variable: NEXT_PUBLIC_ADMIN_EMAILS
    value: elijahmsilverman@gmail.com
    availability: [BUILD, RUNTIME]

  # --- Server-side secrets (Cloud Secret Manager) ---
  - variable: GOOGLE_MAPS_SERVER_KEY
    secret: google-maps-server-key
    availability: [RUNTIME]
  # Zillow listings via RapidAPI (host real-estate-zillow-com.p.rapidapi.com). Secret managed with:
  #   printf '%s' "<KEY>" | gcloud secrets create rapidapi-key --data-file=- --project shulsearch-app --account elijahmsilverman@gmail.com
  #   firebase apphosting:secrets:grantaccess rapidapi-key --backend shulsearch --project shulsearch-app
  - variable: RAPIDAPI_KEY
    secret: rapidapi-key
    availability: [RUNTIME]
